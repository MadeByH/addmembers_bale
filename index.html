<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عضو بگیر بله</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* برای اطمینان از اینکه footer همیشه در پایین صفحه باقی بماند */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: #f3f4f6; /* رنگ پس‌زمینه خاکستری روشن Tailwind */
        }
        main {
            flex: 1; /* به main اجازه می‌دهد تا فضای موجود را اشغال کند */
            padding-bottom: 100px; /* فضای کافی برای نوار ناوبری پایین */
        }
        /* استایل برای نوار ناوبری پایین */
        .bottom-nav-item {
            display: flex;
            flex-direction: column; /* این خط برای نمایش عمودی بود، اما footer اصلی آن را افقی می‌کند */
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #6b7280; /* رنگ خاکستری تیره Tailwind */
            padding: 8px 0;
            flex: 1; /* باعث می‌شود آیتم‌ها فضای مساوی داشته باشند */
            transition: color 0.3s ease;
        }
        .bottom-nav-item:hover {
            color: #111827; /* رنگ مشکی Tailwind */
        }
        .bottom-nav-item i {
            font-size: 24px; /* اندازه آیکون‌ها */
            margin-bottom: 4px; /* فاصله بین آیکون و متن */
        }
        /* استایل برای دکمه‌های اصلی */
        .main-action-button {
            background-color: #3b82f6; /* آبی Tailwind */
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .main-action-button:hover {
            background-color: #2563eb; /* آبی تیره‌تر Tailwind */
        }
    </style>
</head>
<body>

    <header class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center">
            <i class='bx bxl-telegram text-blue-500 text-3xl ml-2'></i>
            <h1 class="text-xl font-bold text-gray-800">عضو بگیر بله</h1>
        </div>
        <nav class="flex space-x-4">
            <a href="#channels" class="text-gray-600 hover:text-blue-500 transition duration-300">کانال</a>
            <a href="#groups" class="text-gray-600 hover:text-blue-500 transition duration-300">گروه</a>
            <a href="#comments" class="text-gray-600 hover:text-blue-500 transition duration-300">کامنت</a>
        </nav>
    </header>

    <main class="flex-1 container mx-auto p-4">
        <!-- بخش پروفایل -->
        <section id="profile" class="bg-white rounded-lg shadow-lg p-6 mb-6 flex items-center space-x-4">
            <div class="relative">
                <img src="https://via.placeholder.com/80" alt="Profile Picture" class="w-20 h-20 rounded-full border-4 border-blue-500">
                <span class="absolute -top-2 -right-2 bg-green-500 text-white text-xs rounded-full p-1">
                    <i class='bx bxs-check-shield'></i>
                </span>
            </div>
            <div>
                <h2 class="text-lg font-semibold text-gray-800">mezonemaleka</h2>
                <p class="text-sm text-gray-500">آخرین فعالیت: همین الان</p>
            </div>
        </section>

        <!-- بخش تنظیمات -->
        <section id="settings" class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">تنظیمات</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex items-center justify-between">
                    <span class="text-gray-700">نمایش عکس پروفایل</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" value="" class="sr-only peer" checked>
                        <div class="w-11 h-6 bg-gray-200 peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-gray-700">بی‌صدا کردن</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" value="" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                </div>
            </div>
        </section>

        <!-- بخش دکمه‌های اصلی -->
        <section id="main-actions" class="bg-white rounded-lg shadow-lg p-6 mb-6 text-center">
            <h2 class="text-lg font-bold text-gray-800 mb-4">اقدامات اصلی</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button class="main-action-button flex items-center justify-center space-x-2 py-3 px-4">
                    <i class='bx bx-bell'></i>
                    <span>هشدار</span>
                </button>
                <button class="main-action-button flex items-center justify-center space-x-2 py-3 px-4">
                    <i class='bx bx-user-plus'></i>
                    <span>افزودن عضو</span>
                </button>
                <button class="main-action-button flex items-center justify-center space-x-2 py-3 px-4">
                    <i class='bx bx-play'></i>
                    <span>ادامه</span>
                </button>
            </div>
        </section>

        <!-- بخش کانال سفارشات (با متن پیش‌فرض) -->
        <section id="orders-channel" class="bg-white rounded-lg shadow-lg p-6 mb-6 text-center">
            <h2 class="text-lg font-bold text-gray-800 mb-4">کانال سفارشات</h2>
            <div class="flex flex-col items-center justify-center h-full">
                 <i class='bx bx-info-circle text-yellow-500 text-4xl mb-3'></i>
                 <p class="text-gray-600 text-lg">کانال جدیدی برای عضویت نیست.</p>
            </div>
        </section>

    </main>

    <footer class="bg-white p-3 fixed bottom-0 left-0 right-0 w-full shadow-md flex justify-around items-center z-50 border-t border-gray-200">
        <a href="#profile" class="bottom-nav-item">
            <i class='bx bx-user'></i>
            <span>پروفایل</span>
        </a>
        <a href="#settings" class="bottom-nav-item">
            <i class='bx bx-cog'></i>
            <span>تنظیمات</span>
        </a>
        <a href="#main-actions" class="bottom-nav-item">
            <i class='bx bx-plus-circle'></i>
            <span>افزودن</span>
        </a>
        <a href="#orders-channel" class="bottom-nav-item">
            <i class='bx bx-list-ul'></i>
            <span>لیست</span>
        </a>
        <a href="#channels" class="bottom-nav-item">
            <i class='bx bx-broadcast'></i>
            <span>کانال</span>
        </a>
    </footer>

</body>
</html>

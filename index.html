<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عضو بگیر بله</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Additional custom styles if needed */
        body {
            font-family: "vazir", sans-serif;
        }
        .gradient-background {
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
        }
        .profile-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .profile-circle img {
            max-width: 60%;
            max-height: 60%;
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            flex-grow: 1;
            color: #757575;
        }
        .bottom-nav-item.active {
            color: #1976D2;
        }
        .bottom-nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .main-buttons .btn {
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-warning {
            background-color: #ff9800;
            color: white;
        }
        .btn-add-member {
            background-color: #4CAF50;
            color: white;
        }
        .btn-continue {
            background-color: #1976D2;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="gradient-background text-white p-4 shadow-md">
        <div class="flex justify-between items-center mb-3">
            <div class="flex items-center">
                <!-- Logo Placeholder -->
                <div class="w-8 h-8 bg-white rounded-full mr-2 flex items-center justify-center">
                    <span class="text-green-600 font-bold text-sm">B</span>
                </div>
                <h1 class="text-xl font-bold">عضو بگیر بله</h1>
            </div>
            <div class="flex space-x-4">
                <button class="text-lg">کانال</button>
                <button class="text-lg font-semibold border-b-2 border-white pb-1">گروه</button>
                <button class="text-lg">کامنت</button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="p-4">

        <!-- Profile Section -->
        <section class="text-center mb-6">
            <div class="profile-circle mx-auto mb-2">
                <!-- Placeholder for Profile Image -->
                <img src="https://img.icons8.com/material-sharp/24/000000/user.png" alt="Profile Icon">
            </div>
            <p class="text-lg font-semibold text-gray-800">mezonemaleka</p>
        </section>

        <!-- Settings Options -->
        <section class="bg-white p-4 rounded-lg shadow-md mb-6">
            <h2 class="text-lg font-bold mb-3 text-gray-700">تنظیمات</h2>
            <div class="flex items-center justify-between mb-3">
                <span>نمایش عکس پروفایل</span>
                <input type="checkbox" class="toggle-checkbox">
            </div>
            <div class="flex items-center justify-between">
                <span>بی‌صدا کردن</span>
                <input type="checkbox" class="toggle-checkbox">
            </div>
        </section>

        <!-- Main Action Buttons -->
        <section class="main-buttons text-center">
            <button class="btn btn-warning w-full mb-3 flex items-center justify-center">
                <i class='bx bx-bell text-xl mr-2'></i> <!-- Bell Icon -->
                <span>هشدار</span>
            </button>
            <button class="btn btn-add-member w-full mb-3 flex items-center justify-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                <i class='bx bx-user-plus text-xl mr-2'></i> <!-- User Plus Icon -->
                <span>افزودن عضو</span>
            </button>
            <button class="btn btn-continue w-full flex items-center justify-center">
                <i class='bx bx-right-arrow-alt text-xl mr-2'></i> <!-- Right Arrow Icon -->
                <span>ادامه</span>
            </button>
        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white shadow-inner p-2 flex justify-around border-t border-gray-200">
        <a href="#" class="bottom-nav-item active">
            <i class='bx bxs-coin text-2xl'></i> <!-- Coin Icon -->
            <span class="text-xs">سکه بگیر</span>
        </a>
        <a href="#" class="bottom-nav-item">
            <i class='bx bx-cart text-2xl'></i> <!-- Cart Icon -->
            <span class="text-xs">سبد خرید</span>
        </a>
        <a href="#" class="bottom-nav-item">
            <i class='bx bx-user-plus text-2xl'></i> <!-- User Plus Icon -->
            <span class="text-xs">افزودن عضو</span>
        </a>
        <a href="#" class="bottom-nav-item">
            <i class='bx bx-list-ul text-2xl'></i> <!-- List Icon -->
            <span class="text-xs">لیست</span>
        </a>
        <a href="#" class="bottom-nav-item">
            <i class='bx bx-user text-2xl'></i> <!-- User Icon -->
            <span class="text-xs">پروفایل</span>
        </a>
    </footer>

    <!-- Include Boxicons CSS -->
    <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>

</body>
</html>
